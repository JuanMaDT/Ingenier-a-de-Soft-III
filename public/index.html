<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centro Cultural Lucy Tejada</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 2rem;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="glass-container login-container animate-fade-in">
            <div class="logo-area">
                <h1 class="gradient-text">Centro Cultural<br>Lucy Tejada</h1>
                <p style="color: var(--text-muted)">Plataforma Integral de Gestión Cultural</p>
            </div>
            
            <div id="alertBox" class="alert" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="admin@cultura.gov">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Iniciar Sesión
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem;">
                <p style="font-size: 0.9rem; color: var(--text-muted);">
                    ¿Eres estudiante? <a href="inscripcion.html" style="color: var(--primary); text-decoration: none;">Inscríbete aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
